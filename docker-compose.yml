services:
    bot:
        image: ghcr.io/adrithedev/hypnobot:latest
        restart: unless-stopped
        environment:
            DISCORD_TOKEN: ${DISCORD_TOKEN}
            CLIENT_ID: ${CLIENT_ID}
            OWNER_IDS: ${OWNER_IDS}
            DEV_MODE: false
            DATABASE_URL: ${DATABASE_URL}
            DATABASE_SSL_CA_PATH: /run/secrets/db-ca-cert
        volumes:
            - /opt/hypnobot/ca-certificate.crt:/run/secrets/db-ca-cert:ro
