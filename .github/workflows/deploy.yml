name: Deploy

on:
    workflow_run:
        workflows: [Build]
        types: [completed]
        branches: [main]
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    deploy:
        name: Deploy to VPS
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        runs-on: self-hosted
        permissions:
            contents: read
            packages: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Copy env file
              run: cp /opt/hypnobot/.env .env

            - name: Check for schema changes
              id: schema
              run: |
                  git diff --name-only HEAD~1 HEAD | grep -q '^prisma/schema\.prisma$' \
                    && echo "changed=true" >> "$GITHUB_OUTPUT" \
                    || echo "changed=false" >> "$GITHUB_OUTPUT"

            - name: Check for command changes
              id: commands
              run: |
                  git diff --name-only HEAD~1 HEAD | grep -qE '^src/commands/|^src/deploy\.ts$' \
                    && echo "changed=true" >> "$GITHUB_OUTPUT" \
                    || echo "changed=false" >> "$GITHUB_OUTPUT"

            - name: Install dependencies
              if: steps.schema.outputs.changed == 'true' || steps.commands.outputs.changed == 'true'
              run: npm ci

            - name: Generate Prisma client
              if: steps.schema.outputs.changed == 'true' || steps.commands.outputs.changed == 'true'
              run: npx prisma generate

            - name: Sync database schema
              if: steps.schema.outputs.changed == 'true'
              run: |
                  export $(grep -v '^#' /opt/hypnobot/.env | grep '^DATABASE_URL=' | xargs)
                  npx prisma db push

            - name: Deploy commands
              if: steps.commands.outputs.changed == 'true'
              run: npm run deploy

            - name: Pull and restart
              run: |
                  docker compose pull
                  docker compose up -d --remove-orphans

            - name: Prune old images
              run: docker image prune -f
